name: discord_feedback
description: "A drop-in Flutter widget to collect and display user feedback via Discord Forum Channels. Creates structured forum posts with tags, device info, and screenshots."
version: 2.0.0
homepage: https://github.com/BuiTuanAnh2001/discord_feedback
repository: https://github.com/BuiTuanAnh2001/discord_feedback
issue_tracker: https://github.com/BuiTuanAnh2001/discord_feedback/issues

topics:
  - discord
  - feedback
  - forum
  - widget
  - realtime

screenshots:
  - description: "Forum post list with tags, sort, and theme customization"
    path: screenshots/feedback_list.png
  - description: "Theme customizer with preset and color picker"
    path: screenshots/reaction_overlay.png

environment:
  sdk: ^3.7.2
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.7.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  web_socket_channel: ^3.0.3
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
